<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meta — Attill</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f8f8f6; --ink: #191917; --ink-muted: #5e5e58;
      --ink-faint: #adadaa; --accent: #1a3a6b; --accent-hover: #0f2548;
      --border: #ddddd8; --transition: 0.25s ease;
    }
    [data-theme="dark"] {
      --bg: #111113; --ink: #e6e6e0; --ink-muted: #8f8f90;
      --ink-faint: #46464a; --accent: #6b9fd4; --accent-hover: #89b5e3;
      --border: #2a2a2e;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 18px; scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--ink); font-family: 'EB Garamond', Georgia, serif; line-height: 1.75; transition: background var(--transition), color var(--transition); min-height: 100vh; }
    .container { max-width: 680px; margin: 0 auto; padding: 0 1.5rem; }

    /* Nav */
    nav { border-bottom: 1px solid var(--border); transition: border-color var(--transition); }
    .nav-inner { display: flex; align-items: center; justify-content: space-between; padding: 1.2rem 0; }
    .nav-logo { font-family: 'Playfair Display', Georgia, serif; font-size: 1.45rem; font-weight: 600; color: var(--ink); text-decoration: none; letter-spacing: 0.02em; transition: color var(--transition); }
    .nav-logo:hover { color: var(--accent); }
    .nav-right { display: flex; align-items: center; gap: 1.75rem; }
    .nav-links { display: flex; align-items: center; gap: 1.75rem; list-style: none; }
    .nav-links a { font-family: 'EB Garamond', serif; font-size: 1rem; color: var(--ink-muted); text-decoration: none; letter-spacing: 0.02em; transition: color var(--transition); }
    .nav-links a:hover, .nav-links a.active { color: var(--ink); }
    #themeToggle { width: 32px; height: 32px; border-radius: 6px; border: 1px solid var(--border); background: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--ink-muted); flex-shrink: 0; transition: border-color var(--transition), color var(--transition); }
    #themeToggle:hover { color: var(--ink); }
    #themeToggle svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* Breadcrumb */
    .breadcrumb { padding: 1.25rem 0 0; display: flex; align-items: center; gap: 0.5rem; font-family: 'EB Garamond', serif; font-size: 0.85rem; color: var(--ink-faint); }
    .breadcrumb a { color: var(--ink-faint); text-decoration: none; transition: color var(--transition); }
    .breadcrumb a:hover { color: var(--ink-muted); }

    /* Page header */
    .page-header { padding: 3rem 0 4rem; border-bottom: 1px solid var(--border); transition: border-color var(--transition); animation: fadeUp 0.55s ease both; }
    .page-title { font-family: 'Playfair Display', Georgia, serif; font-size: clamp(2.8rem, 8vw, 5.25rem); font-weight: 500; line-height: 1.08; letter-spacing: -0.01em; }
    .page-title em { font-style: italic; color: var(--accent); }

    /* About */
    .about-section { padding: 3.5rem 0; transition: border-color var(--transition); animation: fadeUp 0.5s ease 0.08s both; }
    .about-grid { display: grid; grid-template-columns: 160px 1fr; gap: 0 3rem; align-items: start; }
    .about-photo { width: 160px; height: 200px; border-radius: 4px; background: var(--border); overflow: hidden; display: flex; align-items: center; justify-content: center; transition: background var(--transition); }
    .about-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .photo-placeholder { font-family: 'EB Garamond', serif; font-size: 0.72rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-faint); text-align: center; padding: 1rem; line-height: 1.6; }
    .about-location { font-family: 'EB Garamond', serif; font-size: 0.85rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 1.5rem; }
    .about-body { font-size: 1.05rem; color: var(--ink-muted); line-height: 1.85; }
    .about-body p + p { margin-top: 1rem; }

    /* Footer */
    footer { border-top: 1px solid var(--border); padding: 2rem 0; transition: border-color var(--transition); margin-top: 4rem; }
    .footer-inner { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.75rem; }
    .footer-copy { font-family: 'EB Garamond', serif; font-size: 0.85rem; color: var(--ink-faint); }
    .footer-copy a { color: var(--ink-muted); text-decoration: none; transition: color var(--transition); }
    .footer-copy a:hover { color: var(--ink); }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 560px) {
      .about-grid { grid-template-columns: 1fr; gap: 1.75rem; }
      .about-photo { width: 120px; height: 150px; }
      .nav-links { gap: 1.1rem; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="container">
      <div class="nav-inner">
        <a href="/" class="nav-logo">Attill</a>
        <div class="nav-right">
          <ul class="nav-links">
            <li><a href="/writing">Writing</a></li>
            <li><a href="/projects">Projects</a></li>
            <li><a href="/about" class="active">About</a></li>
          </ul>
          <button id="themeToggle" aria-label="Toggle theme">
            <svg id="icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            <svg id="icon-sun" viewBox="0 0 24 24" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          </button>
        </div>
      </div>
    </div>
  </nav>

  <main>
    <div class="container">

      <nav class="breadcrumb" aria-label="Breadcrumb">
        <a href="/about">About</a>
        <span>›</span>
        <span>Meta</span>
      </nav>

      <header class="page-header">
        <h1 class="page-title"><em>Meta</em> Attill.</h1>
      </header>

      <section class="about-section">
        <div class="about-grid">
          <div class="about-photo">
            <div class="photo-placeholder">Photo here</div>
            <!-- <img src="/images/meta.jpg" alt="Meta Attill" /> -->
          </div>
          <div>
            <p class="about-location">📍 Your location</p>
            <div class="about-body">
              <!--
                ╔══════════════════════════════════════════════╗
                ║  A SHORT NOTE ABOUT META GOES HERE           ║
                ╚══════════════════════════════════════════════╝
              -->
              <p>A short note about Meta goes here — her age, personality, favourite things. Keep it as sweet or as brief as you like.</p>
            </div>
          </div>
        </div>
      </section>

    </div>
  </main>

  <footer>
    <div class="container">
      <div class="footer-inner">
        <span class="footer-copy">© 2025 Attill</span>
        <span class="footer-copy"><a href="mailto:hello@attill.com">hello@attill.com</a></span>
      </div>
    </div>
  </footer>

  <script>
    const html = document.documentElement;
    const themeBtn = document.getElementById('themeToggle');
    const sunIcon = document.getElementById('icon-sun');
    const moonIcon = document.getElementById('icon-moon');
    function setTheme(theme) {
      html.setAttribute('data-theme', theme);
      localStorage.setItem('attill-theme', theme);
      sunIcon.style.display = theme === 'dark' ? 'block' : 'none';
      moonIcon.style.display = theme === 'dark' ? 'none' : 'block';
    }
    const saved = localStorage.getItem('attill-theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    setTheme(saved || (prefersDark ? 'dark' : 'light'));
    themeBtn.addEventListener('click', () => setTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'));
  </script>

</body>
</html>
